model:
  fidelity_encoder:
    target: model.V4_CA.vae.FidelityEncoder
    params:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 1
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      - 4
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0
  cldm:
    target: model.V4_CA.cldm.ControlLDM
    params:
      latent_scale_factor: 0.18215
      unet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False
      vae_cfg:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
      clip_cfg:
        embed_dim: 1024
        vision_cfg:
          image_size: 224
          layers: 32
          width: 1280
          head_width: 80
          patch_size: 14
        text_cfg:
          context_length: 77
          vocab_size: 49408
          width: 1024
          heads: 16
          layers: 24
        layer: "penultimate"
      controlnet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        hint_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False

  diffusion:
    target: model.V4_CA.gaussian_diffusion.Diffusion
    params:
      linear_start: 0.00085
      linear_end: 0.0120
      timesteps: 1000

dataset:
  train1:
    target: dataset.mef_dataset.MEFDataset
    params:
      # training file list path
      img_dir: /media/lht/disk/dataset/RASMD/v2/train
      swir_img_dir: /media/lht/disk/dataset/RASMD/v2/train
      # Online low-light simulation parameters
      disable_visible_reinforce: true  # set to false to enable MEF enhancement on GT
      contrast_range: [0.15, 0.95]
      gamma_range: [2.2, 6.0]
      poisson_level: 5.0
      gaussian_sigma: 10.0
      use_salt_pepper: false
      low_retry: 3

eval:
  # Master switch: set to false to disable automatic evaluation after checkpoint save
  enabled: true
  # GPU for eval subprocess (use a different GPU than training to avoid OOM)
  # e.g., "cuda:1", "cuda:0", "cpu"
  device: "cuda:0"
  seed: 231
  tile_size: 512
  tile_stride: 256
  save_all: false
  # Per-dataset evaluation: each key maps to --dataset argument of inference.py
  datasets:
    LowLight:
      data_dir: /media/lht/disk/dataset/RASMD/v2/test-100
      tiled: true

train:
  # pretrained sd v2.1 path
  sd_path: ./ckpts/v2-1_512-ema-pruned.ckpt
  # experiment directory path
  exp_dir: ./exps/UltraFusion
  learning_rate: 1e-4
  # ImageNet 1k (1.3M images)
  # batch size = 192, lr = 1e-4, total training steps = 25k
  # Our filtered laion2b-en (15M images)
  # batch size = 256, lr = 1e-4 (first 30k), 1e-5 (next 50k), total training steps = 80k
  batch_size: 4
  num_workers: 8 
  train_steps: 1000000
  log_every: 50
  ckpt_every: 10
  image_every: 500
  resume: ~